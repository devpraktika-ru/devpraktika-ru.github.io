<!DOCTYPE html>
<html lang="{{ site.lang | default: 'ru' }}">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>{{ page.title | default: site.title }}</title>
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
      rel="stylesheet"
      integrity="sha384-QWTKZyjpPEjISv5WaRU9OFeRpok6YctnYmDr5pNlyT2bRjXh0JMhjY6hW+ALEwIH"
      crossorigin="anonymous"
    />
    <style>
      .site-logo {
        width: clamp(40px, 3vw, 56px);
        height: auto;
      }
    </style>
  </head>
  <body class="d-flex flex-column min-vh-100">
    <header>
      <nav class="navbar navbar-expand-lg navbar-light bg-light border-bottom">
        <div class="container">
          <div class="row justify-content-center w-100">
            <div
              class="col-12 col-xl-10 col-xxl-8 d-flex flex-wrap align-items-center justify-content-between"
            >
              <a class="navbar-brand fw-semibold" href="{% link index.md %}"><img
                class="site-logo"
                width="56"
                height="56"
                alt="dev•praktika"
                src="https://github.com/user-attachments/assets/616632f8-3b81-400a-8b2f-363a1a7e5a59"
              /></a>
              <button
                class="navbar-toggler"
                type="button"
                data-bs-toggle="collapse"
                data-bs-target="#siteNavbar"
                aria-controls="siteNavbar"
                aria-expanded="false"
                aria-label="Toggle navigation"
              >
                <span class="navbar-toggler-icon"></span>
              </button>
              <div class="collapse navbar-collapse" id="siteNavbar">
                <ul class="navbar-nav me-auto mb-2 mb-lg-0">
                  <li class="nav-item">
                    <a
                      class="nav-link{% if page.url contains 'about' %} active{% endif %}"
                      href="{% link about.md %}"
                      {% if page.url contains 'about' %}aria-current="page"{% endif %}
                      >О нас</a
                    >
                  </li>
                  <li class="nav-item">
                    <a
                      class="nav-link{% if page.url contains '/educators' %} active{% endif %}"
                      href="{% link educators/index.md %}"
                      {% if page.url contains '/educators' %}aria-current="page"{% endif %}
                      >Ведущие</a
                    >
                  </li>
                  <li class="nav-item">
                    <a
                      class="nav-link{% if page.url contains '/courses' %} active{% endif %}"
                      href="{% link courses/index.md %}"
                      {% if page.url contains '/courses' %}aria-current="page"{% endif %}
                      >Курсы</a
                    >
                  </li>
                  <li class="nav-item">
                    <a
                      class="nav-link{% if page.url contains '/schedule' %} active{% endif %}"
                      href="{{ '/schedule/' | relative_url }}"
                      {% if page.url contains '/schedule' %}aria-current="page"{% endif %}
                      >Расписание</a
                    >
                  </li>
                  <li class="nav-item">
                    <a
                      class="nav-link{% if page.url contains '/archive' %} active{% endif %}"
                      href="{{ '/archive/' | relative_url }}"
                      {% if page.url contains '/archive' %}aria-current="page"{% endif %}
                      >Архив</a
                    >
                  </li>
                </ul>
                <div class="navbar-text small text-body-secondary ms-lg-3">
                  <span class="d-block">📞 +7 (999) 999-99-99</span>
                  <span class="d-block">🖂 info@devpraktika.ru</span>
                  <span class="d-block">🗨 @devpraktika</span>
                </div>
              </div>
            </div>
          </div>
        </div>
      </nav>
    </header>

    <main class="container py-4 flex-grow-1">
      <div class="row justify-content-center">
        <div class="col-12 col-xl-10 col-xxl-8">{{ content }}</div>
      </div>
    </main>

    <footer class="border-top bg-light mt-auto py-3">
      <div class="container">
        <div class="row justify-content-center">
          <div class="col-12 col-xl-10 col-xxl-8 text-center">
            <p class="text-muted small mb-0">&copy; dev•praktika 2025–{{ "now" | date: "%Y" }}</p>
          </div>
        </div>
      </div>
    </footer>

    <script
      src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"
      integrity="sha384-YvpcrYf0tY3lHB60NNkmXc5s9fDVZLESaAA55NDzOxhy9GkcIdslK1eN7N6jIeHz"
      crossorigin="anonymous"
    ></script>
  </body>
</html>
